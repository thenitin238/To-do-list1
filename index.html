<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily To-Do</title>

<style>
:root {
  --bg:#121212;
  --card:#1e1e1e;
  --text:#ffffff;
  --accent:#ff3d3d;
}

body.light {
  --bg:#f5f5f5;
  --card:#ffffff;
  --text:#000000;
}

* { box-sizing:border-box; font-family:Arial,sans-serif; }

body {
  margin:0;
  min-height:100vh;
  background:var(--bg);
  color:var(--text);
  display:flex;
  justify-content:center;
  padding:20px;
}

.todo {
  width:100%;
  max-width:420px;
  background:var(--card);
  padding:16px;
  border-radius:14px;
  display:flex;
  flex-direction:column;
}

/* Header */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.header h1 { font-size:16px; }
.header button {
  border:none;
  padding:6px 12px;
  border-radius:6px;
  color:white;
  cursor:pointer;
}
.name-btn { background:#4caf50; }
.theme-btn { background:var(--accent); }

/* Profile */
.profile {
  display:flex;
  flex-direction:column;
  align-items:center;
  margin:10px 0;
}
.profile img {
  width:90px;
  height:90px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid var(--accent);
  cursor:pointer;
}
.profile small { font-size:12px; opacity:.7; }
.welcome { margin-top:6px; font-size:22px; font-weight:600; }

/* 🎨 COLOR CONTROLS */
.color-section {
  margin:10px 0;
}
.color-title {
  font-size:13px;
  font-weight:600;
  opacity:.6;
  margin-bottom:4px;
}
.color-controls {
  display:flex;
  gap:8px;
  align-items:center;
}
.color-btn {
  width:28px;
  height:28px;
  border-radius:50%;
  border:none;
  cursor:pointer;
}
.bg-dark { background:#121212; }
.bg-blue { background:#1b263b; }
.bg-green { background:#2d6a4f; }

/* circular picker */
.color-picker {
  width:32px;
  height:32px;
  border-radius:50%;
  border:none;
  padding:0;
  cursor:pointer;
}
.color-picker::-webkit-color-swatch {
  border-radius:50%;
  border:none;
}
.color-picker::-webkit-color-swatch-wrapper {
  padding:0;
}

/* Input */
.input-box {
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}
.input-box input,
.input-box select {
  padding:10px;
  border:none;
  border-radius:6px;
}
.input-box input[type="text"] { flex:1 1 100%; }
.input-box input[type="time"] { width:120px; }
.input-box input[type="number"] { width:80px; }
.input-box select { width:90px; }

.input-box button {
  background:var(--accent);
  border:none;
  color:white;
  padding:10px 14px;
  border-radius:6px;
  cursor:pointer;
}

/* Tasks */
ul {
  list-style:none;
  padding:0;
  margin:14px 0;
}
li {
  background:rgba(0,0,0,.35);
  padding:10px;
  margin-bottom:8px;
  border-radius:6px;
  display:flex;
  gap:8px;
}
body.light li { background:#e0e0e0; }

li.completed .task-text {
  text-decoration:line-through;
  opacity:.6;
}

.task-info { flex:1; }
.task-text { font-size:15px; }
.task-time { font-size:13px; opacity:.7; }

.actions {
  display:flex;
  align-items:center;
  gap:5px;
}
.actions button {
  border:none;
  padding:5px 7px;
  border-radius:4px;
  cursor:pointer;
}
.edit { background:orange; }
.delete { background:red; color:white; }

.save-btn {
  background:green;
  color:white;
  border:none;
  padding:12px;
  border-radius:8px;
  font-size:15px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="todo" id="todoBox">

  <div class="header">
    <button class="name-btn" onclick="changeName()">Name</button>
    <h1>To-Do-List</h1>
    <button class="theme-btn" onclick="toggleTheme()">Theme</button>
  </div>

  <div class="profile">
    <img id="profileImg" onclick="pickProfile()">
    <small>Tap photo to change</small>
    <input type="file" id="profileInput" hidden>
    <div class="welcome" id="welcomeText"></div>
  </div>

  <!-- 🎨 PAGE BACKGROUND -->
  <div class="color-section">
    <div class="color-title">Page background</div>
    <div class="color-controls">
      <button class="color-btn bg-dark" onclick="setPageBg('#121212')"></button>
      <button class="color-btn bg-blue" onclick="setPageBg('#1b263b')"></button>
      <button class="color-btn bg-green" onclick="setPageBg('#2d6a4f')"></button>
      <input type="color" class="color-picker" onchange="setPageBg(this.value)">
    </div>
  </div>

  <!-- 🎨 CARD BACKGROUND -->
  <div class="color-section">
    <div class="color-title">To-Do background</div>
    <div class="color-controls">
      <button class="color-btn bg-dark" onclick="setCardBg('#1e1e1e')"></button>
      <button class="color-btn bg-blue" onclick="setCardBg('#2a3a5e')"></button>
      <button class="color-btn bg-green" onclick="setCardBg('#2d6a4f')"></button>
      <input type="color" class="color-picker" onchange="setCardBg(this.value)">
    </div>
  </div>

  <!-- INPUT -->
  <div class="input-box">
    <input id="taskInput" placeholder="Task (Exercise, Study...)">
    <input type="time" id="fromTime">
    <input type="number" id="durationInput" min="1" placeholder="Time">
    <select id="unitInput">
      <option value="min">min</option>
      <option value="hr">hr</option>
    </select>
    <button onclick="addTask()">Add</button>
  </div>

  <ul id="taskList"></ul>

  <button class="save-btn" onclick="saveTasks()">Save</button>
</div>

<script>
const taskInput=document.getElementById("taskInput");
const fromTimeInput=document.getElementById("fromTime");
const durationInput=document.getElementById("durationInput");
const unitInput=document.getElementById("unitInput");
const list=document.getElementById("taskList");
const welcomeText=document.getElementById("welcomeText");
const profileImg=document.getElementById("profileImg");
const profileInput=document.getElementById("profileInput");
const todoBox=document.getElementById("todoBox");

let tasks=JSON.parse(localStorage.getItem("tasks"))||[];
let name=localStorage.getItem("name")||"User";
let photo=localStorage.getItem("photo");
let pageBg=localStorage.getItem("pageBg");
let cardBg=localStorage.getItem("cardBg");
let theme=localStorage.getItem("theme")||"dark";
let isSaved=true;

/* restore */
welcomeText.textContent=`Welcome, ${name} 👋`;
profileImg.src=photo||"https://via.placeholder.com/90";
if(pageBg)document.body.style.background=pageBg;
if(cardBg)todoBox.style.background=cardBg;
if(theme==="light")document.body.classList.add("light");

/* theme */
function toggleTheme(){
  document.body.classList.toggle("light");
  theme=document.body.classList.contains("light")?"light":"dark";
  localStorage.setItem("theme",theme);
}

/* profile */
function changeName(){
  const n=prompt("Enter name",name);
  if(n){
    name=n;
    localStorage.setItem("name",n);
    welcomeText.textContent=`Welcome, ${n} 👋`;
  }
}
function pickProfile(){profileInput.click();}
profileInput.onchange=e=>{
  const r=new FileReader();
  r.onload=()=>{
    profileImg.src=r.result;
    localStorage.setItem("photo",r.result);
  };
  r.readAsDataURL(e.target.files[0]);
};

/* colors */
function setPageBg(c){
  document.body.style.background=c;
  localStorage.setItem("pageBg",c);
}
function setCardBg(c){
  todoBox.style.background=c;
  localStorage.setItem("cardBg",c);
}

/* helpers */
function formatDuration(mins){
  const h=Math.floor(mins/60);
  const m=mins%60;
  return `${h}:${m.toString().padStart(2,"0")} hr`;
}
function formatTime(t){
  if(!t)return"";
  let[h,m]=t.split(":").map(Number);
  const ap=h>=12?"PM":"AM";
  h=h%12||12;
  return `${h}:${m.toString().padStart(2,"0")} ${ap}`;
}

/* tasks */
render();

function addTask(){
  if(!taskInput.value||!durationInput.value)return;

  let minutes=
    unitInput.value==="hr"
      ? Number(durationInput.value)*60
      : Number(durationInput.value);

  tasks.push({
    text:taskInput.value,
    from:fromTimeInput.value||null,
    minutes,
    completed:false
  });

  taskInput.value="";
  fromTimeInput.value="";
  durationInput.value="";
  isSaved=false;
  render();
}

function toggleComplete(i){
  tasks[i].completed=!tasks[i].completed;
  isSaved=false;
  render();
}
function editTask(i){
  const t=prompt("Edit task",tasks[i].text);
  if(t){
    tasks[i].text=t;
    isSaved=false;
    render();
  }
}
function deleteTask(i){
  tasks.splice(i,1);
  isSaved=false;
  render();
}

function render(){
  list.innerHTML="";
  tasks.forEach((t,i)=>{
    const li=document.createElement("li");
    if(t.completed)li.classList.add("completed");
    li.innerHTML=`
      <div class="task-info">
        <div class="task-text">${t.text}</div>
        ${t.from?`<div class="task-time">⏰ From: ${formatTime(t.from)}</div>`:""}
        <div class="task-time">⏱️ ${formatDuration(t.minutes)}</div>
      </div>
      <div class="actions">
        <button class="edit" onclick="editTask(${i})">✏</button>
        <button class="delete" onclick="deleteTask(${i})">✖</button>
        <input type="checkbox" ${t.completed?"checked":""}
          onclick="toggleComplete(${i})">
      </div>`;
    list.appendChild(li);
  });
}

function saveTasks(){
  localStorage.setItem("tasks",JSON.stringify(tasks));
  isSaved=true;
  alert("Saved");
}

window.addEventListener("beforeunload",e=>{
  if(!isSaved){
    e.preventDefault();
    e.returnValue="";
  }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily To-Do</title>

<style>
:root {
    --bg:#121212;
    --card:#1e1e1e;
    --text:#ffffff;
    --accent:#ff3d3d;
}

body.light {
    --bg:#f5f5f5;
    --text:#000000;
    --accent:#d32f2f;
}

* { box-sizing:border-box; font-family:Arial,sans-serif; }

body {
    margin:0;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:20px;
}

/* App */
.todo {
    width:100%;
    max-width:420px;
    background:var(--card);
    padding:16px;
    border-radius:12px;
    display:flex;
    flex-direction:column;
}

/* Header */
.header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:8px;
}

.header button {
    border:none;
    padding:6px 12px;
    border-radius:6px;
    color:white;
    cursor:pointer;
}

.name-btn { background:#4caf50; }
.theme-btn { background:var(--accent); }

.welcome {
    text-align:center;
    margin-bottom:6px;
}

/* Card color controls */
.color-controls {
    display:flex;
    gap:6px;
    margin-bottom:8px;
}

.color-controls button {
    flex:1;
    border:none;
    padding:8px;
    border-radius:6px;
    cursor:pointer;
    color:white;
}

.c1 { background:#1e1e1e; }
.c2 { background:#2a3a5e; }
.c3 { background:#2d6a4f; }
.c4 { background:#5a1f2d; }

/* Input */
.input-box {
    display:flex;
    gap:6px;
}

.input-box input,
.input-box input[type="time"] {
    padding:10px;
    border:none;
    border-radius:6px;
    outline:none;
}

.input-box input[type="text"] { flex:1; }

.input-box button {
    background:var(--accent);
    border:none;
    color:white;
    padding:10px 14px;
    border-radius:6px;
    cursor:pointer;
}

/* Tasks */
ul {
    list-style:none;
    padding:0;
    margin:14px 0;
    flex:1;
    overflow-y:auto;
}

li {
    background:rgba(0,0,0,0.35);
    padding:10px;
    margin-bottom:8px;
    border-radius:6px;
    display:flex;
    align-items:center;
    gap:8px;
}

body.light li { background:#e0e0e0; }

li.completed .task-text {
    text-decoration:line-through;
    opacity:.6;
}

.task-info { flex:1; }
.task-text { font-size:15px; }
.task-time { font-size:12px; opacity:.7; }

.actions {
    display:flex;
    align-items:center;
    gap:5px;
}

.actions button {
    border:none;
    padding:5px 7px;
    border-radius:4px;
    cursor:pointer;
}

.edit { background:orange; }
.delete { background:red; color:white; }

/* Save */
.save-btn {
    background:green;
    color:white;
    border:none;
    padding:12px;
    border-radius:8px;
    font-size:15px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="todo" id="todoBox">

    <div class="header">
        <button class="name-btn" onclick="changeName()">Name</button>
        <button class="theme-btn" onclick="toggleTheme()">Theme</button>
    </div>

    <div class="welcome" id="welcomeText"></div>

    <!-- To-Do Card Color -->
    <div class="color-controls">
        <button class="c1" onclick="setCardColor('#1e1e1e')"></button>
        <button class="c2" onclick="setCardColor('#2a3a5e')"></button>
        <button class="c3" onclick="setCardColor('#2d6a4f')"></button>
        <button class="c4" onclick="setCardColor('#5a1f2d')"></button>
    </div>

    <div class="input-box">
        <input id="taskInput" placeholder="Task">
        <input type="time" id="timeInput">
        <button onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>

    <button class="save-btn" onclick="saveTasks()">Save</button>
</div>

<script>
const taskInput = document.getElementById("taskInput");
const timeInput = document.getElementById("timeInput");
const list = document.getElementById("taskList");
const welcomeText = document.getElementById("welcomeText");
const todoBox = document.getElementById("todoBox");

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let theme = localStorage.getItem("theme") || "dark";
let userName = localStorage.getItem("userName");
let cardColor = localStorage.getItem("cardColor");
let isSaved = true;

/* Name */
if (!userName) {
    userName = prompt("Enter your name") || "User";
    localStorage.setItem("userName", userName);
}
welcomeText.textContent = `Welcome, ${userName} 👋`;

function changeName() {
    const n = prompt("Enter your name", userName);
    if (n && n.trim()) {
        userName = n;
        localStorage.setItem("userName", userName);
        welcomeText.textContent = `Welcome, ${userName} 👋`;
    }
}

/* Theme */
document.body.className = theme;
function toggleTheme() {
    theme = theme === "dark" ? "light" : "dark";
    document.body.className = theme;
    localStorage.setItem("theme", theme);
}

/* Card Color */
if (cardColor) todoBox.style.background = cardColor;

function setCardColor(color) {
    todoBox.style.background = color;
    localStorage.setItem("cardColor", color);
}

/* Tasks */
render();

function addTask() {
    if (!taskInput.value.trim()) return;
    tasks.unshift({
        text: taskInput.value,
        time: timeInput.value || "No time",
        completed:false
    });
    taskInput.value="";
    timeInput.value="";
    isSaved=false;
    render();
}

function toggleComplete(i){
    tasks[i].completed=!tasks[i].completed;
    isSaved=false;
    render();
}

function editTask(i){
    const t = prompt("Edit task", tasks[i].text);
    if (t && t.trim()) {
        tasks[i].text=t;
        isSaved=false;
        render();
    }
}

function deleteTask(i){
    tasks.splice(i,1);
    isSaved=false;
    render();
}

function render(){
    list.innerHTML="";
    tasks.forEach((t,i)=>{
        const li=document.createElement("li");
        if(t.completed) li.classList.add("completed");

        const info=document.createElement("div");
        info.className="task-info";

        const text=document.createElement("div");
        text.className="task-text";
        text.textContent=t.text;

        const time=document.createElement("div");
        time.className="task-time";
        time.textContent="⏰ "+t.time;

        info.append(text,time);

        const actions=document.createElement("div");
        actions.className="actions";

        const check=document.createElement("input");
        check.type="checkbox";
        check.checked=t.completed;
        check.onclick=()=>toggleComplete(i);

        const edit=document.createElement("button");
        edit.textContent="✏";
        edit.className="edit";
        edit.onclick=()=>editTask(i);

        const del=document.createElement("button");
        del.textContent="✖";
        del.className="delete";
        del.onclick=()=>deleteTask(i);

        actions.append(edit,del,check);
        li.append(info,actions);
        list.appendChild(li);
    });
}

/* Save */
function saveTasks(){
    localStorage.setItem("tasks",JSON.stringify(tasks));
    isSaved=true;
    alert("Saved");
}

/* Exit warning */
window.addEventListener("beforeunload",e=>{
    if(!isSaved){
        e.preventDefault();
        e.returnValue="";
    }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily To-Do</title>

    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #ffffff;
            --accent: #ff3d3d;
        }

        body.light {
            --bg: #f5f5f5;
            --card: #ffffff;
            --text: #000000;
        }

        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .todo {
            width: 100%;
            max-width: 420px;
            background: var(--card);
            padding: 16px;
            border-radius: 14px;
            display: flex;
            flex-direction: column;
        }

        /* header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 16px;
        }

        .header button {
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }

        .name-btn {
            background: #4caf50;
        }

        .theme-btn {
            background: var(--accent);
        }

        /* profile */
        .profile {
            text-align: center;
            margin: 10px 0;
        }

        .profile img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            object-fit: cover;
            cursor: pointer;
        }

        .profile small {
            font-size: 12px;
            opacity: .7;
        }

        .welcome {
            margin-top: 6px;
            font-size: 22px;
            font-weight: 600;
        }

        /* stats */
        .stats {
            display: flex;
            gap: 6px;
            margin: 10px 0;
            font-size: 13px;
        }

        .stat {
            flex: 1;
            padding: 6px;
            border-radius: 6px;
            text-align: center;
            color: white;
        }

        .total {
            background: #607d8b;
        }

        .done {
            background: #4caf50;
        }

        .not-done {
            background: #f44336;
        }

        .pending {
            background: #ff9800;
        }

        .extra {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 8px;
        }

        /* filters */
        .filters {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
        }

        .filters button {
            flex: 1;
            border: none;
            padding: 6px;
            border-radius: 6px;
            cursor: pointer;
        }

        .filters .active {
            background: var(--accent);
            color: white;
        }

        /* color */
        .color-section {
            margin: 10px 0;
        }

        .color-title {
            font-size: 13px;
            font-weight: 600;
            opacity: .6;
            margin-bottom: 4px;
        }

        .color-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .color-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
        }

        .color-btn.selected,
        .color-picker.selected {
            border-color: white;
            box-shadow: 0 0 0 2px var(--accent);
        }

        .color-picker {
            -webkit-appearance: none;
            appearance: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            padding: 0;
            cursor: pointer;
            background: none;
        }

        .color-picker::-webkit-color-swatch-wrapper {
            padding: 0;
            border-radius: 50%;
        }

        .color-picker::-webkit-color-swatch {
            border: none;
            border-radius: 50%;
        }

        .color-picker::-moz-color-swatch {
            border: none;
            border-radius: 50%;
        }

        /* input */
        .input-box {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .input-box input,
        .input-box select {
            padding: 10px;
            border: none;
            border-radius: 6px;
        }

        .input-box input[type="text"] {
            flex: 1 1 100%;
        }

        .input-box input[type="time"] {
            width: 120px;
        }

        .input-box input[type="number"] {
            width: 80px;
        }

        .input-box select {
            width: 90px;
        }

        .input-box button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
        }

        /* tasks */
        ul {
            list-style: none;
            padding: 0;
            margin: 14px 0;
        }

        li {
            background: rgba(0, 0, 0, .35);
            padding: 10px;
            border-radius: 6px;
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        body.light li {
            background: #e0e0e0;
        }

        li.done {
            border-left: 4px solid #4caf50;
        }

        li.not-done {
            border-left: 4px solid #f44336;
            opacity: .7;
        }

        li.not-done .task-text {
            text-decoration: line-through;
        }

        .task-info {
            flex: 1;
        }

        .task-text {
            font-size: 15px;
        }

        .task-time {
            font-size: 13px;
            opacity: .7;
        }

        .actions {
            display: flex;
            gap: 5px;
        }

        .actions button {
            border: none;
            padding: 5px 7px;
            border-radius: 4px;
            cursor: pointer;
        }

        .done-btn {
            background: #4caf50;
            color: white;
        }

        .not-btn {
            background: #f44336;
            color: white;
        }

        .save-btn {
            background: green;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="todo" id="todoBox">

        <div class="header">
            <button class="name-btn" onclick="changeName()">Name</button>
            <h1>To-Do-List</h1>
            <button class="theme-btn" onclick="toggleTheme()">Theme</button>
        </div>

        <div class="profile">
            <img id="profileImg" onclick="pickProfile()">
            <small>Tap photo to change</small>
            <input type="file" id="profileInput" hidden>
            <div class="welcome" id="welcomeText"></div>
        </div>

        <div class="stats">
            <div class="stat total">Total<br><span id="totalCount">0</span></div>
            <div class="stat done">Done<br><span id="doneCount">0</span></div>
            <div class="stat not-done">Not<br><span id="notDoneCount">0</span></div>
            <div class="stat pending">Pending<br><span id="pendingCount">0</span></div>
        </div>

        <div class="extra">
            <div>Completion: <span id="percent">0%</span></div>
            <div>🔥 Streak: <span id="streak">0</span></div>
        </div>

        <div class="filters">
            <button class="active" onclick="setFilter('all',this)">All</button>
            <button onclick="setFilter('done',this)">Done</button>
            <button onclick="setFilter('not-done',this)">Not</button>
            <button onclick="setFilter('pending',this)">Pending</button>
        </div>

        <div class="color-section">
            <div class="color-title">Page background</div>
            <div class="color-controls" id="pageColors">
                <button class="color-btn" style="background:#121212" data-color="#121212"
                    onclick="setPageBg('#121212',this)"></button>
                <button class="color-btn" style="background:#1b263b" data-color="#1b263b"
                    onclick="setPageBg('#1b263b',this)"></button>
                <button class="color-btn" style="background:#2d6a4f" data-color="#2d6a4f"
                    onclick="setPageBg('#2d6a4f',this)"></button>
                <input type="color" class="color-picker" id="pagePicker" oninput="setPageBg(this.value,'picker')">
            </div>
        </div>

        <div class="color-section">
            <div class="color-title">To-Do background</div>
            <div class="color-controls" id="cardColors">
                <button class="color-btn" style="background:#1e1e1e" data-color="#1e1e1e"
                    onclick="setCardBg('#1e1e1e',this)"></button>
                <button class="color-btn" style="background:#2a3a5e" data-color="#2a3a5e"
                    onclick="setCardBg('#2a3a5e',this)"></button>
                <button class="color-btn" style="background:#2d6a4f" data-color="#2d6a4f"
                    onclick="setCardBg('#2d6a4f',this)"></button>
                <input type="color" class="color-picker" id="cardPicker" oninput="setCardBg(this.value,'picker')">
            </div>
        </div>

        <div class="input-box">
            <input id="taskInput" placeholder="Task">
            <input type="time" id="fromTime">
            <input type="number" id="durationInput" min="1" placeholder="Time">
            <select id="unitInput">
                <option value="min">min</option>
                <option value="hr">hr</option>
            </select>
            <button onclick="addTask()">Add</button>
        </div>

        <ul id="taskList"></ul>
        <button class="save-btn" onclick="saveTasks()">Save</button>

    </div>

    <script>
        const todoBox = document.getElementById("todoBox");
        const taskInput = document.getElementById("taskInput");
        const fromTimeInput = document.getElementById("fromTime");
        const durationInput = document.getElementById("durationInput");
        const unitInput = document.getElementById("unitInput");
        const list = document.getElementById("taskList");

        const totalCount = document.getElementById("totalCount");
        const doneCount = document.getElementById("doneCount");
        const notDoneCount = document.getElementById("notDoneCount");
        const pendingCount = document.getElementById("pendingCount");
        const percent = document.getElementById("percent");
        const streakEl = document.getElementById("streak");

        const welcomeText = document.getElementById("welcomeText");
        const profileImg = document.getElementById("profileImg");

        let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
        let name = localStorage.getItem("name") || "User";
        let photo = localStorage.getItem("photo");
        let theme = localStorage.getItem("theme") || "dark";
        let pageBg = localStorage.getItem("pageBg");
        let cardBg = localStorage.getItem("cardBg");
        let filter = "all";
        let streak = +localStorage.getItem("streak") || 0;
        let lastDoneDate = localStorage.getItem("lastDoneDate");
        let isSaved = true;

        /* restore */
        welcomeText.textContent = `Welcome, ${name} 👋`;
        profileImg.src = photo || "https://via.placeholder.com/90";
        if (theme === "light") document.body.classList.add("light");
        if (pageBg) document.body.style.background = pageBg;
        if (cardBg) todoBox.style.background = cardBg;

        /* restore color highlight */
        function restoreHighlight(parentId, color) {
            if (!color) return;
            const parent = document.getElementById(parentId);
            const btn = [...parent.querySelectorAll(".color-btn")]
                .find(b => b.dataset.color === color);
            highlight(parent, btn || 'picker');
        }
        restoreHighlight("pageColors", pageBg);
        restoreHighlight("cardColors", cardBg);

        function toggleTheme() {
            document.body.classList.toggle("light");
            localStorage.setItem("theme", document.body.classList.contains("light") ? "light" : "dark");
        }
        function changeName() {
            const n = prompt("Enter name", name);
            if (n) {
                name = n;
                localStorage.setItem("name", n);
                welcomeText.textContent = `Welcome, ${n} 👋`;
            }
        }
        function pickProfile() {
            document.getElementById("profileInput").click();
        }
        document.getElementById("profileInput").onchange = e => {
            const r = new FileReader();
            r.onload = () => {
                profileImg.src = r.result;
                localStorage.setItem("photo", r.result);
            };
            r.readAsDataURL(e.target.files[0]);
        };

        function highlight(parent, btn) {
            parent.querySelectorAll(".color-btn,.color-picker")
                .forEach(el => el.classList.remove("selected"));
            if (btn === "picker") parent.querySelector(".color-picker").classList.add("selected");
            else if (btn) btn.classList.add("selected");
        }
        function setPageBg(c, btn) {
            document.body.style.background = c;
            localStorage.setItem("pageBg", c);
            highlight(document.getElementById("pageColors"), btn);
            isSaved = false;
        }
        function setCardBg(c, btn) {
            todoBox.style.background = c;
            localStorage.setItem("cardBg", c);
            highlight(document.getElementById("cardColors"), btn);
            isSaved = false;
        }

        function formatTime(t) {
            if (!t) return "";
            let [h, m] = t.split(":").map(Number);
            const ap = h >= 12 ? "PM" : "AM";
            h = h % 12 || 12;
            return `${h}:${m.toString().padStart(2, "0")} ${ap}`;
        }
        function formatDuration(mins) {
            const h = Math.floor(mins / 60);
            const m = mins % 60;
            return h ? `${h}h ${m}m` : `${m}m`;
        }

        function addTask() {
            if (!taskInput.value || !durationInput.value) return;
            const minutes = unitInput.value === "hr"
                ? durationInput.value * 60
                : +durationInput.value;
            tasks.push({
                text: taskInput.value,
                from: fromTimeInput.value || null,
                minutes,
                status: "pending"
            });
            taskInput.value = "";
            fromTimeInput.value = "";
            durationInput.value = "";
            isSaved = false;
            autoSave();
            render();
        }

        function markDone(i) {
            tasks[i].status = "done";
            const today = new Date().toDateString();
            if (lastDoneDate !== today) {
                streak++;
                lastDoneDate = today;
                localStorage.setItem("streak", streak);
                localStorage.setItem("lastDoneDate", today);
            }
            isSaved = false;
            autoSave();
            render();
        }
        function markNotDone(i) {
            tasks[i].status = "not-done";
            isSaved = false;
            autoSave();
            render();
        }

        function setFilter(f, btn) {
            filter = f;
            document.querySelectorAll(".filters button")
                .forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            render();
        }

        function autoSave() {
            localStorage.setItem("tasks", JSON.stringify(tasks));
        }
        function saveTasks() {
            autoSave();
            isSaved = true;
            alert("Saved");
        }

        /* unsaved warning */
        window.addEventListener("beforeunload", e => {
            if (!isSaved) {
                e.preventDefault();
                e.returnValue = "";
            }
        });

        function render() {
            list.innerHTML = "";
            let done = 0, not = 0, pend = 0;
            tasks.forEach((t, i) => {
                if (t.status === "done") done++;
                else if (t.status === "not-done") not++;
                else pend++;
                if (filter !== "all" && t.status !== filter) return;
                const li = document.createElement("li");
                li.className = t.status;
                li.innerHTML = `
      <div class="task-info">
        <div class="task-text">${t.text}</div>
        ${t.from ? `<div class="task-time">⏰ ${formatTime(t.from)}</div>` : ""}
        <div class="task-time">⏱ ${formatDuration(t.minutes)}</div>
      </div>
      <div class="actions">
        <button class="done-btn" onclick="markDone(${i})">✔</button>
        <button class="not-btn" onclick="markNotDone(${i})">✖</button>
      </div>`;
                list.appendChild(li);
            });
            totalCount.textContent = tasks.length;
            doneCount.textContent = done;
            notDoneCount.textContent = not;
            pendingCount.textContent = pend;
            percent.textContent = tasks.length ? Math.round(done / tasks.length * 100) + "%" : "0%";
            streakEl.textContent = streak;
        }

        render();
    </script>

</body>

</html>

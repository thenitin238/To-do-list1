<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily To-Do</title>

    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #ffffff;
            --accent: #38bdf8;
        }

        body.light {
            --bg: #f5f7fb;
            --card: #ffffff;
            --text: #111827;
        }

        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .todo {
            width: 100%;
            max-width: 420px;
            background: var(--card);
            padding: 16px;
            border-radius: 14px;
            position: relative;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            margin: 0;
            font-size: 18px;
            font-weight: bolder;
            padding: 0 125px;
            text-decoration: underline;
        }

        .menu-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 22px;
            cursor: pointer;
        }

        /* MENU */
        .menu {
            position: absolute;
            top: 42px;
            right: 16px;
            background: var(--card);
            border-radius: 10px;
            padding: 10px;
            width: 240px;
            display: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .4);
            z-index: 10;
        }

        .menu.show {
            display: block;
        }

        .menu h4 {
            margin: 10px 0 4px;
            font-size: 12px;
            opacity: .6;
        }

        .menu button {
            width: 100%;
            margin: 4px 0;
            padding: 8px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: #374151;
            color: white;
        }

        .menu input {
            width: 100%;
            margin: 4px 0;
            padding: 6px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
        }

        /* PROFILE */
        .profile {
            text-align: center;
            margin: 10px 0;
        }

        .profile img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            object-fit: cover;
        }

        .welcome {
            margin-top: 6px;
            font-size: 20px;
            font-weight: 600;
        }

        .today-date {
            text-align: center;
            font-size: 13px;
            opacity: .7;
            margin-bottom: 8px;
        }

        /* STATS */
        .stats {
            display: flex;
            gap: 6px;
            margin: 10px 0;
            font-size: 13px;
        }

        .stat {
            flex: 1;
            padding: 6px;
            border-radius: 6px;
            text-align: center;
            color: white;
        }

        .total {
            background: #607d8b;
        }

        .done {
            background: #4caf50;
        }

        .not {
            background: #f44336;
        }

        .pending {
            background: #ff9800;
        }

        .extra {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }

        /* FILTERS */
        .filters {
            display: flex;
            gap: 6px;
            margin: 10px 0;
        }

        .filters button {
            flex: 1;
            border: none;
            padding: 6px;
            border-radius: 6px;
            cursor: pointer;
        }

        .filters .active {
            background: var(--accent);
            color: white;
        }

        /* INPUT */
        .input-box {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .input-box input,
        .input-box select {
            padding: 10px;
            border: none;
            border-radius: 6px;
        }

        .input-box input[type="text"] {
            flex: 1 1 100%;
        }

        .input-box input[type="time"] {
            width: 120px;
        }

        .input-box input[type="number"] {
            width: 80px;
        }

        .input-box select {
            width: 90px;
        }

        .input-box button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
        }

        /* TASKS */
        ul {
            list-style: none;
            padding: 0;
            margin: 14px 0;
        }

        li {
            background: rgba(0, 0, 0, .35);
            padding: 10px;
            border-radius: 6px;
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        li.done {
            border-left: 4px solid #4caf50;
        }

        li.not {
            border-left: 4px solid #f44336;
            opacity: .7;
        }

        li.pending {
            border-left: 4px solid #ff9800;
        }

        li.overdue {
            border-left: 4px solid #ff1744;
            background: rgba(255, 0, 0, .15);
        }

        .task-info {
            flex: 1;
        }

        .task-time {
            font-size: 13px;
            opacity: .7;
        }

        .actions {
            display: flex;
            gap: 5px;
        }

        .actions button {
            border: none;
            padding: 5px 7px;
            border-radius: 4px;
            cursor: pointer;
        }

        .done-btn {
            background: #4caf50;
            color: white;
        }

        .not-btn {
            background: #f44336;
            color: white;
        }

        /* SAVE */
        .save-wrap {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 12px;
        }

        .save-btn {
            background: green;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 999px;
            font-size: 15px;
            cursor: pointer;
        }

        /* CHART */
        canvas {
            margin-top: 10px;
            border-radius: 6px;
            background: #000;
            display: none;
        }
    </style>
</head>

<body>
    <div class="todo" id="todoBox">

        <div class="header">
            <h1>To-Do-List</h1>
            <button class="menu-btn" onclick="toggleMenu()">⋮</button>
        </div>

        <div class="menu" id="menu">
            <h4>Name</h4>
            <input id="nameInput">
            <button onclick="saveName()">Save Name</button>

            <h4>Profile</h4>
            <button onclick="pickProfile()">Change Photo</button>
            <input type="file" id="profileInput">

            <h4>Theme</h4>
            <button onclick="toggleTheme()">Light / Dark</button>

            <h4>Page Background</h4>
            <input type="color" onchange="setPageBg(this.value)">

            <h4>Card Background</h4>
            <input type="color" onchange="setCardBg(this.value)">

            <h4>Analytics</h4>
            <button onclick="toggleChart()">Show / Hide Chart</button>
        </div>

        <div class="profile">
            <img id="profileImg">
            <div class="welcome" id="welcomeText"></div>
        </div>

        <div class="today-date" id="todayDate"></div>

        <div class="stats">
            <div class="stat total">Total<br><span id="total">0</span></div>
            <div class="stat done">Done<br><span id="done">0</span></div>
            <div class="stat not">Not<br><span id="not">0</span></div>
            <div class="stat pending">Pending<br><span id="pending">0</span></div>
        </div>

        <div class="extra">
            <div>Completion: <span id="percent">0%</span></div>
            <div>🔥 Streak: <span id="streak">0</span></div>
        </div>

        <div class="filters">
            <button class="active" onclick="setFilter('all',this)">All</button>
            <button onclick="setFilter('done',this)">Done</button>
            <button onclick="setFilter('not',this)">Not</button>
            <button onclick="setFilter('pending',this)">Pending</button>
        </div>

        <div class="input-box">
            <input id="taskInput" placeholder="Task">
            <input type="time" id="fromTime">
            <input type="number" id="duration" min="1" placeholder="Time">
            <select id="unit">
                <option value="min">min</option>
                <option value="hr">hr</option>
            </select>
            <button onclick="addTask()">Add</button>
        </div>

        <ul id="taskList"></ul>

        <canvas id="performanceChart" width="360" height="150"></canvas>

        <div class="save-wrap">
            <button class="save-btn" onclick="saveTasks()">Save</button>
            <button class="save-btn" style="background:#ff9800" onclick="endDay('manual')">End Day</button>
        </div>

    </div>

    <script>
        /* ===== STATE ===== */
        let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
        let history = JSON.parse(localStorage.getItem("history")) || [];
        let streak = +localStorage.getItem("streak") || 0;
        let filter = "all";
        let lastClosedDay = localStorage.getItem("lastClosedDay");

        /* ===== ELEMENTS ===== */
        const taskList = document.getElementById("taskList");
        const welcomeText = document.getElementById("welcomeText");
        const profileImg = document.getElementById("profileImg");
        const nameInput = document.getElementById("nameInput");
        const todayDate = document.getElementById("todayDate");
        const menu = document.getElementById("menu");
        const todoBox = document.getElementById("todoBox");
        const chart = document.getElementById("performanceChart");

        /* ===== INIT ===== */
        welcomeText.textContent = `Welcome, ${localStorage.getItem("name") || "User"}`;
        nameInput.value = localStorage.getItem("name") || "";
        profileImg.src = localStorage.getItem("photo") || "https://via.placeholder.com/90";
        todayDate.textContent = new Date().toLocaleDateString(undefined, {
            weekday: "long", day: "2-digit", month: "short", year: "numeric"
        });
        chart.style.display = localStorage.getItem("showChart") === "true" ? "block" : "none";

        /* ===== UI ===== */
        function toggleMenu() { menu.classList.toggle("show"); }
        function saveName() {
            localStorage.setItem("name", nameInput.value.trim());
            welcomeText.textContent = `Welcome, ${nameInput.value.trim()}`;
            menu.classList.remove("show");
        }
        function pickProfile() { profileInput.click(); }
        profileInput.onchange = e => {
            const r = new FileReader();
            r.onload = () => { profileImg.src = r.result; localStorage.setItem("photo", r.result); };
            r.readAsDataURL(e.target.files[0]);
        };
        function toggleTheme() { document.body.classList.toggle("light"); }
        function setPageBg(c) { document.body.style.background = c; }
        function setCardBg(c) { todoBox.style.background = c; }
        function toggleChart() {
            const show = chart.style.display !== "block";
            chart.style.display = show ? "block" : "none";
            localStorage.setItem("showChart", show);
            if (show) drawChart(); // 🔥 force redraw
        }


        /* ===== TASK LOGIC ===== */
        function addTask() {
            if (!taskInput.value || !duration.value) return;
            const mins = unit.value === "hr" ? duration.value * 60 : +duration.value;
            tasks.push({
                text: taskInput.value,
                from: fromTime.value,
                mins,
                createdAt: Date.now(),
                status: "pending"
            });
            taskInput.value = ""; fromTime.value = ""; duration.value = "";
            render();
        }

        function isOverdue(t) {
            if (!t.from || t.status !== "pending") return false;
            const [h, m] = t.from.split(":").map(Number);
            const d = new Date();
            d.setHours(h); d.setMinutes(m + t.mins); d.setSeconds(0);
            return Date.now() > d.getTime();
        }

        function mark(i, s) {
            tasks[i].status = s;
            render();
            tryAutoEndDay(); // 🔑 auto reset after last task
        }

        function removeTask(i) {
            tasks.splice(i, 1);
            render();
            tryAutoEndDay();
        }

        /* ===== DAY END (MANUAL + AUTO) ===== */
        function endDay(mode = "manual") {
            const today = new Date().toDateString();

            // prevent duplicate AUTO close
            if (lastClosedDay === today && mode === "auto") return;

            const total = tasks.length;
            const doneCount = tasks.filter(t => t.status === "done").length;
            const percent = total ? Math.round(doneCount / total * 100) : 0;

            // only save analytics ONCE per day
            if (lastClosedDay !== today) {
                history.push({ date: today, total, done: doneCount, percent, mode });
                if (history.length > 15) history.shift();
                localStorage.setItem("history", JSON.stringify(history));

                streak = percent >= 70 ? streak + 1 : 0;
                localStorage.setItem("streak", streak);
            }

            // mark day closed
            lastClosedDay = today;
            lastCloseMode = mode;
            localStorage.setItem("lastClosedDay", today);
            localStorage.setItem("lastCloseMode", mode);

            // reset tasks ONLY on manual OR first auto
            tasks = [];

            render();
        }


        function tryAutoEndDay() {
            const today = new Date().toDateString();
            if (lastClosedDay === today) return;

            const pending = tasks.filter(t => t.status === "pending").length;
            if (pending !== 0) return;

            endDay("auto");
        }


        /* ===== FILTER ===== */
        function setFilter(f, b) {
            filter = f;
            document.querySelectorAll(".filters button").forEach(x => x.classList.remove("active"));
            b.classList.add("active");
            render();
        }

        /* ===== SAVE ===== */
        function saveTasks() {
            localStorage.setItem("tasks", JSON.stringify(tasks));
            alert("Saved");
        }

        /* ===== CHART ===== */
        function drawChart() {
            if (chart.offsetParent === null) return;

            const ctx = chart.getContext("2d");
            ctx.clearRect(0, 0, chart.width, chart.height);

            const barWidth = 16;
            const gap = 8;
            const maxBars = Math.min(history.length, 15);

            history.slice(-maxBars).forEach((d, i) => {
                const h = (d.percent / 100) * (chart.height - 30);
                const x = 10 + i * (barWidth + gap);
                const y = chart.height - h - 10;

                ctx.fillStyle = "#38bdf8";
                ctx.fillRect(x, y, barWidth, h);

                // percent text
                ctx.fillStyle = "#fff";
                ctx.font = "10px Arial";
                ctx.fillText(d.percent + "%", x - 2, y - 4);
            });
        }

        function formatDuration(mins) {
            const h = Math.floor(mins / 60);
            const m = mins % 60;

            if (h === 0) return `${m} min`;
            return `${h}:${m.toString().padStart(2, "0")} hr`;
        }


        /* ===== RENDER ===== */
        function render() {
            taskList.innerHTML = "";
            let d = 0, n = 0, p = 0;

            tasks.forEach((t, i) => {
                if (t.status === "done") d++;
                else if (t.status === "not") n++;
                else p++;

                if (filter !== "all" && t.status !== filter) return;

                const li = document.createElement("li");
                li.className = t.status;
                if (isOverdue(t)) li.classList.add("overdue");

                li.innerHTML = `
      <div class="task-info">
        <div>${t.text}</div>
        ${t.from ? `<div class="task-time">⏰ ${t.from}</div>` : ""}
        <div class="task-time">⏱ ${formatDuration(t.mins)}</div>

      </div>
      <div class="actions">
        <button class="done-btn" onclick="mark(${i},'done')">✔</button>
        <button class="not-btn" onclick="mark(${i},'not')">✖</button>
        <button onclick="removeTask(${i})">🗑</button>
      </div>`;
                taskList.appendChild(li);
            });

            total.textContent = tasks.length;
            done.textContent = d;
            not.textContent = n;
            pending.textContent = p;
            percent.textContent = tasks.length ? Math.round(d / tasks.length * 100) + "%" : "0%";
            streak.textContent = streak;

            drawChart();
            localStorage.setItem("tasks", JSON.stringify(tasks));
        }

        render();
    </script>
</body>

</html>

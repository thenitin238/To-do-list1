<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily To-Do</title>

<style>
:root{
  --bg:#121212;
  --card:#1e1e1e;
  --text:#ffffff;
  --accent:#ff3d3d;
}

*{
  box-sizing:border-box;
  font-family:Arial,sans-serif;
  -webkit-tap-highlight-color: transparent;
}

body{
  margin:0;
  min-height:100vh;
  background:var(--bg);
  background-size:cover;
  background-position:center;
  color:var(--text);
  display:flex;
  justify-content:center;
  padding:20px;
}

.todo{
  width:100%;
  max-width:420px;
  background:var(--card);
  background-size:cover;
  background-position:center;
  padding:16px;
  border-radius:14px;
  display:flex;
  flex-direction:column;
}

/* Header */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.header h1{font-size:16px;margin:0;}
.header button{
  border:none;
  padding:8px 12px;
  border-radius:6px;
  color:white;
}
.name-btn{background:#4caf50;}
.theme-btn{background:var(--accent);}

/* Profile */
.profile{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin:10px 0;
}
.profile img{
  width:90px;
  height:90px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid var(--accent);
}

/* Performance */
#performance{
  font-size:13px;
  margin:8px 0;
}

/* Background controls */
.bg-controls{
  display:flex;
  gap:6px;
  margin-bottom:8px;
}
.bg-controls button,
.bg-controls input{
  flex:1;
  padding:8px;
  border:none;
  border-radius:6px;
}

/* Input (FIXED FOR MOBILE) */
.input-box{
  display:grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap:6px;
}
.input-box input,
.input-box button{
  padding:12px;
  border:none;
  border-radius:6px;
}
.input-box input[type="text"]{
  grid-column:1/4;
}

/* Tasks */
ul{
  list-style:none;
  padding:0;
  margin:14px 0;
}
li{
  background:#2a2a2a;
  padding:10px;
  margin-bottom:8px;
  border-radius:6px;
}
li.missed{
  background:#5a1f1f;
}

/* Save */
.save-btn{
  background:green;
  color:white;
  border:none;
  padding:12px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="todo" id="todoBox">

  <div class="header">
    <button id="nameBtn" class="name-btn">Name</button>
    <h1>To-Do-List</h1>
    <button id="themeBtn" class="theme-btn">Theme</button>
  </div>

  <div class="profile">
    <img id="profileImg">
    <input type="file" id="profileInput" hidden>
    <div id="welcomeText"></div>
  </div>

  <div id="performance"></div>

  <div class="input-box">
    <input id="taskInput" placeholder="Task">
    <input type="time" id="fromTime">
    <input type="time" id="toTime">
    <button id="addBtn">Add</button>
  </div>

  <ul id="taskList"></ul>

  <button class="save-btn" id="saveBtn">Save</button>
</div>

<script>
/* ELEMENTS */
const taskInput = document.getElementById("taskInput");
const fromTime = document.getElementById("fromTime");
const toTime = document.getElementById("toTime");
const list = document.getElementById("taskList");
const addBtn = document.getElementById("addBtn");
const saveBtn = document.getElementById("saveBtn");
const performanceBox = document.getElementById("performance");
const welcomeText = document.getElementById("welcomeText");

/* STATE */
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let name = localStorage.getItem("name") || "User";

/* INIT */
welcomeText.textContent = `Welcome, ${name} 👋`;
render();

/* HELPERS */
function toMin(t){
  const [h,m]=t.split(":").map(Number);
  return h*60+m;
}
function fmt(t){
  let[h,m]=t.split(":").map(Number);
  const ap=h>=12?"PM":"AM";
  h=h%12||12;
  return `${h}:${m.toString().padStart(2,"0")} ${ap}`;
}

/* ADD TASK (MOBILE SAFE) */
addBtn.addEventListener("click", ()=>{
  if(!taskInput.value || !fromTime.value || !toTime.value){
    alert("Fill all fields");
    return;
  }

  const start = toMin(fromTime.value);
  const end = toMin(toTime.value);
  if(end<=start){
    alert("End time must be after start time");
    return;
  }

  const diff = end-start;
  const dur = diff>=60 ? `${Math.floor(diff/60)} hr` : `${diff} min`;

  tasks.push({
    text: taskInput.value,
    from: fromTime.value,
    to: toTime.value,
    duration: dur,
    completed:false
  });

  taskInput.value="";
  fromTime.value="";
  toTime.value="";
  render();
});

/* RENDER */
function render(){
  list.innerHTML="";
  let planned=0, completed=0;
  const now=new Date();
  const nowMin=now.getHours()*60+now.getMinutes();

  tasks.forEach((t,i)=>{
    const mins=toMin(t.to)-toMin(t.from);
    planned+=mins;
    if(t.completed) completed+=mins;
    const missed=!t.completed && nowMin>toMin(t.to);

    const li=document.createElement("li");
    if(missed) li.classList.add("missed");

    li.innerHTML=`
      <b>${t.text} (${t.duration})</b><br>
      🕒 ${fmt(t.from)} – ${fmt(t.to)}<br>
      <input type="checkbox" ${t.completed?"checked":""}>
    `;

    li.querySelector("input").addEventListener("change",()=>{
      t.completed=!t.completed;
      render();
    });

    list.appendChild(li);
  });

  const pct = planned ? Math.round((completed/planned)*100) : 0;
  performanceBox.innerHTML = `Today: ${Math.floor(planned/60)}h planned | ${Math.floor(completed/60)}h done | ${pct}%`;
}

/* SAVE */
saveBtn.addEventListener("click", ()=>{
  localStorage.setItem("tasks",JSON.stringify(tasks));
  alert("Saved");
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily To-Do</title>

<style>
:root {
  --bg:#121212;
  --card:#1e1e1e;
  --text:#ffffff;
  --accent:#ff3d3d;
}
body.light {
  --bg:#f5f5f5;
  --text:#000000;
  --accent:#d32f2f;
}

* { box-sizing:border-box; font-family:Arial,sans-serif; }

body {
  margin:0;
  min-height:100vh;
  background:var(--bg);
  color:var(--text);
  display:flex;
  justify-content:center;
  padding:20px;
}

/* App */
.todo {
  width:100%;
  max-width:420px;
  background:var(--card);
  padding:16px;
  border-radius:14px;
  display:flex;
  flex-direction:column;
}

/* Header */
.header {
  display:flex;
  justify-content:space-between;
}
.header button {
  border:none;
  padding:6px 12px;
  border-radius:6px;
  color:white;
  cursor:pointer;
}
  .header h1{
    font-size:16px;
  }
.name-btn { background:#4caf50; }
.theme-btn { background:var(--accent); }

/* Profile */
.profile {
  display:flex;
  flex-direction:column;
  align-items:center;
  margin:10px 0;
}
.profile img {
  width:90px;
  height:90px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid var(--accent);
  cursor:pointer;
}
.profile small {
  font-size:12px;
  opacity:.7;
}
.welcome {
  margin-top:6px;
  font-size:22px;
  font-weight:600;
}

/* Input */
.input-box {
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}
.input-box input,
.input-box select {
  padding:10px;
  border:none;
  border-radius:6px;
}
.input-box input[type="text"] { flex:1 1 100%; }
.input-box input[type="number"] { width:80px; }
.input-box select { width:90px; }

.input-box button {
  background:var(--accent);
  border:none;
  color:white;
  padding:10px 14px;
  border-radius:6px;
  cursor:pointer;
}

/* Tasks */
ul {
  list-style:none;
  padding:0;
  margin:14px 0;
  flex:1;
  overflow-y:auto;
}
li {
  background:rgba(0,0,0,.35);
  padding:10px;
  margin-bottom:8px;
  border-radius:6px;
  display:flex;
  gap:8px;
}
body.light li { background:#e0e0e0; }

li.completed .task-text {
  text-decoration:line-through;
  opacity:.6;
}

.task-info { flex:1; }
.task-text { font-size:15px; }
.task-time { font-size:13px; opacity:.7; }

.actions {
  display:flex;
  align-items:center;
  gap:5px;
}
.actions button {
  border:none;
  padding:5px 7px;
  border-radius:4px;
  cursor:pointer;
}
.edit { background:orange; }
.delete { background:red; color:white; }

/* Save */
.save-btn {
  background:green;
  color:white;
  border:none;
  padding:12px;
  border-radius:8px;
  font-size:15px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="todo">

  <div class="header">
    <button class="name-btn" onclick="changeName()">Name</button>
    <h1>To-Do-List</h1>
    <button class="theme-btn" onclick="toggleTheme()">Theme</button>
  </div>

  <div class="profile">
    <img id="profileImg" onclick="pickProfile()">
    <small>Tap photo to change</small>
    <input type="file" id="profileInput" hidden accept="image/*">
    <div class="welcome" id="welcomeText"></div>
  </div>

  <div class="input-box">
    <input id="taskInput" placeholder="Task (Exercise, Study...)">
    <input type="number" id="durationInput" min="1" placeholder="Time">
    <select id="unitInput">
      <option value="min">min</option>
      <option value="hr">hr</option>
    </select>
    <button onclick="addTask()">Add</button>
  </div>

  <ul id="taskList"></ul>

  <button class="save-btn" onclick="saveTasks()">Save</button>
</div>

<script>
const taskInput = document.getElementById("taskInput");
const durationInput = document.getElementById("durationInput");
const unitInput = document.getElementById("unitInput");
const list = document.getElementById("taskList");
const welcomeText = document.getElementById("welcomeText");
const profileImg = document.getElementById("profileImg");
const profileInput = document.getElementById("profileInput");

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let theme = localStorage.getItem("theme") || "dark";
let name = localStorage.getItem("name") || prompt("Enter your name") || "User";
let photo = localStorage.getItem("photo");
let isSaved = true;

welcomeText.textContent = `Welcome, ${name} 👋`;
document.body.className = theme;
profileImg.src = photo || "https://via.placeholder.com/90";

function changeName(){
  const n = prompt("Enter name", name);
  if(n){ name=n; localStorage.setItem("name",n); welcomeText.textContent=`Welcome, ${n} 👋`; }
}
function toggleTheme(){
  theme = theme==="dark"?"light":"dark";
  document.body.className=theme;
  localStorage.setItem("theme",theme);
}
function pickProfile(){ profileInput.click(); }
profileInput.onchange=e=>{
  const r=new FileReader();
  r.onload=()=>{ profileImg.src=r.result; localStorage.setItem("photo",r.result); }
  r.readAsDataURL(e.target.files[0]);
};

render();

function addTask(){
  if(!taskInput.value || !durationInput.value) return;
  tasks.unshift({
    text: taskInput.value,
    duration: `${durationInput.value} ${unitInput.value}`,
    completed:false
  });
  taskInput.value=""; durationInput.value="";
  isSaved=false; render();
}

function toggleComplete(i){ tasks[i].completed=!tasks[i].completed; isSaved=false; render(); }
function editTask(i){
  const t=prompt("Edit task",tasks[i].text);
  if(t){ tasks[i].text=t; isSaved=false; render(); }
}
function deleteTask(i){ tasks.splice(i,1); isSaved=false; render(); }

function render(){
  list.innerHTML="";
  tasks.forEach((t,i)=>{
    const li=document.createElement("li");
    if(t.completed) li.classList.add("completed");
    li.innerHTML=`
      <div class="task-info">
        <div class="task-text">${t.text}</div>
        <div class="task-time">⏱️ ${t.duration}</div>
      </div>
      <div class="actions">
        <button class="edit" onclick="editTask(${i})">✏</button>
        <button class="delete" onclick="deleteTask(${i})">✖</button>
        <input type="checkbox" ${t.completed?"checked":""} onclick="toggleComplete(${i})">
      </div>`;
    list.appendChild(li);
  });
}

function saveTasks(){
  localStorage.setItem("tasks",JSON.stringify(tasks));
  isSaved=true;
  alert("Saved");
}

window.addEventListener("beforeunload",e=>{
  if(!isSaved){ e.preventDefault(); e.returnValue=""; }
});
</script>

</body>
</html>

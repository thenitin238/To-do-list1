<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily To-Do</title>

<style>
:root {
  --bg:#121212;
  --card:#1e1e1e;
  --text:#ffffff;
  --accent:#ff3d3d;
}
body.light {
  --bg:#f5f5f5;
  --text:#000000;
  --accent:#d32f2f;
}

* { box-sizing:border-box; font-family:Arial,sans-serif; }

body {
  margin:0;
  min-height:100vh;
  background:var(--bg);
  background-size:cover;
  background-position:center;
  color:var(--text);
  display:flex;
  justify-content:center;
  padding:20px;
}

/* App */
.todo {
  width:100%;
  max-width:420px;
  background:var(--card);
  padding:16px;
  border-radius:14px;
  display:flex;
  flex-direction:column;
}

/* Header */
.header {
  display:flex;
  justify-content:space-between;
}
.header button {
  border:none;
  padding:6px 12px;
  border-radius:6px;
  color:white;
  cursor:pointer;
}
.name-btn { background:#4caf50; }
.theme-btn { background:var(--accent); }

/* Profile */
.profile {
  display:flex;
  flex-direction:column;
  align-items:center;
  margin:10px 0;
}
.profile img {
  width:90px;
  height:90px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid var(--accent);
  cursor:pointer;
}
.profile small {
  font-size:12px;
  opacity:.7;
}
.welcome {
  margin-top:6px;
  font-size:22px;
  font-weight:600;
}

/* Controls */
.controls {
  display:flex;
  gap:6px;
  margin-bottom:8px;
}
.controls button, .controls input {
  flex:1;
  padding:8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
.bg1 { background:#121212; color:white; }
.bg2 { background:#1b263b; color:white; }
.bg3 { background:#2d6a4f; color:white; }

/* Card color */
.card-colors {
  display:flex;
  gap:6px;
  margin-bottom:8px;
}
.card-colors button {
  flex:1;
  height:28px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
.c1 { background:#1e1e1e; }
.c2 { background:#2a3a5e; }
.c3 { background:#2d6a4f; }
.c4 { background:#5a1f2d; }

/* Input */
.input-box {
  display:flex;
  gap:6px;
}
.input-box input,
.input-box input[type="time"] {
  padding:10px;
  border:none;
  border-radius:6px;
}
.input-box input[type="text"] { flex:1; }
.input-box button {
  background:var(--accent);
  border:none;
  color:white;
  padding:10px 14px;
  border-radius:6px;
  cursor:pointer;
}

/* Tasks */
ul {
  list-style:none;
  padding:0;
  margin:14px 0;
  flex:1;
  overflow-y:auto;
}
li {
  background:rgba(0,0,0,.35);
  padding:10px;
  margin-bottom:8px;
  border-radius:6px;
  display:flex;
  gap:8px;
}
body.light li { background:#e0e0e0; }

li.completed .task-text {
  text-decoration:line-through;
  opacity:.6;
}
.task-info { flex:1; }
.task-text { font-size:15px; }
.task-time { font-size:12px; opacity:.7; }

.actions {
  display:flex;
  align-items:center;
  gap:5px;
}
.actions button {
  border:none;
  padding:5px 7px;
  border-radius:4px;
  cursor:pointer;
}
.edit { background:orange; }
.delete { background:red; color:white; }

/* Save */
.save-btn {
  background:green;
  color:white;
  border:none;
  padding:12px;
  border-radius:8px;
  font-size:15px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="todo" id="todoBox">

  <div class="header">
    <button class="name-btn" onclick="changeName()">Name</button>
    <h1>To-Do-List</h1>
    <button class="theme-btn" onclick="toggleTheme()">Theme</button>
  </div>

  <div class="profile">
    <img id="profileImg" onclick="pickProfile()">
    <small>Tap photo to change</small>
    <input type="file" id="profileInput" hidden accept="image/*">
    <div class="welcome" id="welcomeText"></div>
  </div>

  <!-- Background -->
  <div class="controls">
    <button class="bg1" onclick="setBgColor('#121212')">Dark</button>
    <button class="bg2" onclick="setBgColor('#1b263b')">Blue</button>
    <button class="bg3" onclick="setBgColor('#2d6a4f')">Green</button>
    <input type="file" accept="image/*" onchange="setBgImage(event)">
  </div>

  <!-- Card color -->
  <div class="card-colors">
    <button class="c1" onclick="setCard('#1e1e1e')"></button>
    <button class="c2" onclick="setCard('#2a3a5e')"></button>
    <button class="c3" onclick="setCard('#2d6a4f')"></button>
    <button class="c4" onclick="setCard('#5a1f2d')"></button>
  </div>

  <div class="input-box">
    <input id="taskInput" placeholder="Task">
    <input type="time" id="timeInput">
    <button onclick="addTask()">Add</button>
  </div>

  <ul id="taskList"></ul>

  <button class="save-btn" onclick="saveTasks()">Save</button>
</div>

<script>
const taskInput = document.getElementById("taskInput");
const timeInput = document.getElementById("timeInput");
const list = document.getElementById("taskList");
const welcomeText = document.getElementById("welcomeText");
const todoBox = document.getElementById("todoBox");
const profileImg = document.getElementById("profileImg");
const profileInput = document.getElementById("profileInput");

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let theme = localStorage.getItem("theme") || "dark";
let name = localStorage.getItem("name") || prompt("Enter your name") || "User";
let card = localStorage.getItem("card");
let bg = localStorage.getItem("bg");
let photo = localStorage.getItem("photo");
let isSaved = true;

welcomeText.textContent = `Welcome, ${name} 👋`;
localStorage.setItem("name", name);

document.body.className = theme;
if (card) todoBox.style.background = card;
if (bg) document.body.style.background = bg;
profileImg.src = photo || "https://via.placeholder.com/90";

function changeName(){
  const n = prompt("Enter name", name);
  if(n){ name=n; localStorage.setItem("name",n); welcomeText.textContent=`Welcome, ${n} 👋`; }
}

function toggleTheme(){
  theme = theme==="dark"?"light":"dark";
  document.body.className=theme;
  localStorage.setItem("theme",theme);
}

function setCard(c){ todoBox.style.background=c; localStorage.setItem("card",c); }

function setBgColor(c){ document.body.style.background=c; localStorage.setItem("bg",c); }

function setBgImage(e){
  const r=new FileReader();
  r.onload=()=>{ document.body.style.background=`url(${r.result})`; localStorage.setItem("bg",`url(${r.result})`); }
  r.readAsDataURL(e.target.files[0]);
}

function pickProfile(){ profileInput.click(); }
profileInput.onchange=e=>{
  const r=new FileReader();
  r.onload=()=>{ profileImg.src=r.result; localStorage.setItem("photo",r.result); }
  r.readAsDataURL(e.target.files[0]);
};

render();
function addTask(){
  if(!taskInput.value) return;
  tasks.unshift({text:taskInput.value,time:timeInput.value||"No time",completed:false});
  taskInput.value=""; timeInput.value=""; isSaved=false; render();
}
function toggleComplete(i){ tasks[i].completed=!tasks[i].completed; isSaved=false; render(); }
function editTask(i){
  const t=prompt("Edit task",tasks[i].text);
  if(t){ tasks[i].text=t; isSaved=false; render(); }
}
function deleteTask(i){ tasks.splice(i,1); isSaved=false; render(); }

function render(){
  list.innerHTML="";
  tasks.forEach((t,i)=>{
    const li=document.createElement("li");
    if(t.completed) li.classList.add("completed");
    li.innerHTML=`
      <div class="task-info">
        <div class="task-text">${t.text}</div>
        <div class="task-time">⏰ ${t.time}</div>
      </div>
      <div class="actions">
        <button class="edit" onclick="editTask(${i})">✏</button>
        <button class="delete" onclick="deleteTask(${i})">✖</button>
        <input type="checkbox" ${t.completed?"checked":""} onclick="toggleComplete(${i})">
      </div>`;
    list.appendChild(li);
  });
}

function saveTasks(){
  localStorage.setItem("tasks",JSON.stringify(tasks));
  isSaved=true;
  alert("Saved");
}

window.addEventListener("beforeunload",e=>{
  if(!isSaved){ e.preventDefault(); e.returnValue=""; }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily To-Do</title>

    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #ffffff;
            --accent: #38bdf8;
        }

        body.light {
            --bg: #f5f7fb;
            --card: #ffffff;
            --text: #111827;
        }

        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .todo {
            width: 100%;
            max-width: 420px;
            background: var(--card);
            padding: 16px;
            border-radius: 14px;
            position: relative;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            margin: 0;
            font-size: 19px;
            padding: 0 85px;
            text-decoration: underline;
        }

        .menu-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 22px;
            cursor: pointer;
        }

        /* MENU */
        .menu {
            position: absolute;
            top: 42px;
            right: 16px;
            background: var(--card);
            border-radius: 10px;
            padding: 10px;
            width: 240px;
            display: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .4);
            z-index: 10;
        }

        .menu.show {
            display: block;
        }

        .menu h4 {
            margin: 10px 0 4px;
            font-size: 12px;
            opacity: .6;
        }

        .menu button {
            width: 100%;
            margin: 4px 0;
            padding: 8px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: #374151;
            color: white;
        }

        .menu input {
            width: 100%;
            margin: 4px 0;
            padding: 6px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
        }

        /* PROFILE */
        .profile {
            text-align: center;
            margin: 10px 0;
        }

        .profile img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            object-fit: cover;
        }

        .welcome {
            margin-top: 6px;
            font-size: 20px;
            font-weight: 600;
        }

        .today-date {
            text-align: center;
            font-size: 13px;
            opacity: 0.7;
            margin-bottom: 8px;
        }

        /* STATS */
        .stats {
            display: flex;
            gap: 6px;
            margin: 10px 0;
            font-size: 13px;
        }

        .stat {
            flex: 1;
            padding: 6px;
            border-radius: 6px;
            text-align: center;
            color: white;
        }

        .total {
            background: #607d8b;
        }

        .done {
            background: #4caf50;
        }

        .not {
            background: #f44336;
        }

        .pending {
            background: #ff9800;
        }

        .extra {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 8px;
        }

        /* FILTERS */
        .filters {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
        }

        .filters button {
            flex: 1;
            border: none;
            padding: 6px;
            border-radius: 6px;
            cursor: pointer;
        }

        .filters .active {
            background: var(--accent);
            color: white;
        }

        /* INPUT */
        .input-box {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .input-box input,
        .input-box select {
            padding: 10px;
            border: none;
            border-radius: 6px;
        }

        .input-box input[type="text"] {
            flex: 1 1 100%;
        }

        .input-box input[type="time"] {
            width: 120px;
        }

        .input-box input[type="number"] {
            width: 80px;
        }

        .input-box select {
            width: 90px;
        }

        .input-box button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
        }

        /* TASKS */
        ul {
            list-style: none;
            padding: 0;
            margin: 14px 0;
        }

        li {
            background: rgba(0, 0, 0, .35);
            padding: 10px;
            border-radius: 6px;
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        li.done {
            border-left: 4px solid #4caf50;
        }

        li.not {
            border-left: 4px solid #f44336;
            opacity: .7;
        }

        .task-info {
            flex: 1;
        }

        .task-time {
            font-size: 13px;
            opacity: .7;
        }

        .actions {
            display: flex;
            gap: 5px;
        }

        .actions button {
            border: none;
            padding: 5px 7px;
            border-radius: 4px;
            cursor: pointer;
        }

        .done-btn {
            background: #4caf50;
            color: white;
        }

        .not-btn {
            background: #f44336;
            color: white;
        }

        /* SAVE */
        .save-wrap {
            display: flex;
            justify-content: center;
            margin-top: 12px;
        }

        .save-btn {
            background: green;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 999px;
            font-size: 15px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="todo" id="todoBox">

        <div class="header">
            <h1>To-Do-List</h1>
            <button class="menu-btn" onclick="toggleMenu()">⋮</button>
        </div>

        <div class="menu" id="menu">
            <h4>Name</h4>
            <input id="nameInput">
            <button onclick="saveName()">Save Name</button>

            <h4>Profile</h4>
            <button onclick="pickProfile()">Change Photo</button>
            <input type="file" id="profileInput">

            <h4>Theme</h4>
            <button onclick="toggleTheme()">Light / Dark</button>

            <h4>Page Background</h4>
            <input type="color" onchange="setPageBg(this.value)">

            <h4>Card Background</h4>
            <input type="color" onchange="setCardBg(this.value)">
        </div>

        <div class="profile">
            <img id="profileImg">
            <div class="welcome" id="welcomeText"></div>
        </div>

        <div class="today-date" id="todayDate"></div>

        <div class="stats">
            <div class="stat total">Total<br><span id="total">0</span></div>
            <div class="stat done">Done<br><span id="done">0</span></div>
            <div class="stat not">Not<br><span id="not">0</span></div>
            <div class="stat pending">Pending<br><span id="pending">0</span></div>
        </div>

        <div class="extra">
            <div>Completion: <span id="percent">0%</span></div>
            <div>🔥 Streak: <span id="streak">0</span></div>
        </div>

        <div class="filters">
            <button class="active" onclick="setFilter('all',this)">All</button>
            <button onclick="setFilter('done',this)">Done</button>
            <button onclick="setFilter('not',this)">Not</button>
            <button onclick="setFilter('pending',this)">Pending</button>
        </div>

        <div class="input-box">
            <input id="taskInput" placeholder="Task">
            <input type="time" id="fromTime">
            <input type="number" id="duration" min="1" placeholder="Time">
            <select id="unit">
                <option value="min">min</option>
                <option value="hr">hr</option>
            </select>
            <button onclick="addTask()">Add</button>
        </div>

        <ul id="taskList"></ul>

        <div class="save-wrap">
            <button class="save-btn" onclick="saveTasks()">Save</button>
        </div>

    </div>

    <script>
        /* STATE */
        let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
        let name = localStorage.getItem("name") || "User";
        let photo = localStorage.getItem("photo");
        let streak = +localStorage.getItem("streak") || 0;
        let lastDone = localStorage.getItem("lastDone");
        let filter = "all";

        /* ELEMENTS */
        const menu = document.getElementById("menu");
        const taskList = document.getElementById("taskList");
        const welcomeText = document.getElementById("welcomeText");
        const profileImg = document.getElementById("profileImg");
        const nameInput = document.getElementById("nameInput");
        const todayDate = document.getElementById("todayDate");
        const todoBox = document.getElementById("todoBox");

        /* INIT */
        welcomeText.textContent = `Welcome, ${name}`;
        nameInput.value = name;
        profileImg.src = photo || "https://via.placeholder.com/90";

        todayDate.textContent =
            "📅 " + new Date().toLocaleDateString(undefined, {
                weekday: "long",
                day: "2-digit",
                month: "short",
                year: "numeric"
            });

        /* MENU */
        function toggleMenu() {
            menu.classList.toggle("show");
        }

        /* NAME */
        function saveName() {
            const v = nameInput.value.trim();
            if (!v) return;
            name = v;
            localStorage.setItem("name", v);
            welcomeText.textContent = `Welcome, ${v}`;
            menu.classList.remove("show");
        }

        /* PROFILE */
        function pickProfile() {
            document.getElementById("profileInput").click();
        }
        profileInput.onchange = e => {
            const r = new FileReader();
            r.onload = () => {
                profileImg.src = r.result;
                localStorage.setItem("photo", r.result);
            };
            r.readAsDataURL(e.target.files[0]);
        };

        /* THEME & COLORS */
        function toggleTheme() {
            document.body.classList.toggle("light");
        }
        function setPageBg(c) {
            document.body.style.background = c;
            localStorage.setItem("pageBg", c);
        }
        function setCardBg(c) {
            todoBox.style.background = c;
            localStorage.setItem("cardBg", c);
        }

        /* TASKS */
        function addTask() {
            if (!taskInput.value || !duration.value) return;
            const mins = unit.value === "hr" ? duration.value * 60 : +duration.value;
            tasks.push({
                text: taskInput.value,
                from: fromTime.value || null,
                mins,
                status: "pending"
            });
            taskInput.value = "";
            fromTime.value = "";
            duration.value = "";
            render();
        }

        function mark(i, s) {
            tasks[i].status = s;
            if (s === "done") {
                const today = new Date().toDateString();
                if (today !== lastDone) {
                    streak++;
                    lastDone = today;
                    localStorage.setItem("streak", streak);
                    localStorage.setItem("lastDone", today);
                }
            }
            render();
        }

        function setFilter(f, b) {
            filter = f;
            document.querySelectorAll(".filters button")
                .forEach(x => x.classList.remove("active"));
            b.classList.add("active");
            render();
        }

        function saveTasks() {
            localStorage.setItem("tasks", JSON.stringify(tasks));
            alert("Saved");
        }

        /* RENDER — FIXED PENDING */
        function render() {
            taskList.innerHTML = "";
            let d = 0, n = 0, p = 0;

            tasks.forEach((t, i) => {
                if (t.status === "done") d++;
                else if (t.status === "not") n++;
                else if (t.status === "pending") p++;

                if (filter !== "all" && t.status !== filter) return;

                const li = document.createElement("li");
                li.className = t.status;
                li.innerHTML = `
      <div class="task-info">
        <div class="task-text">${t.text}</div>
        ${t.from ? `<div class="task-time">⏰ ${t.from}</div>` : ""}
        <div class="task-time">⏱ ${t.mins} min</div>
      </div>
      <div class="actions">
        <button class="done-btn" onclick="mark(${i},'done')">✔</button>
        <button class="not-btn" onclick="mark(${i},'not')">✖</button>
      </div>`;
                taskList.appendChild(li);
            });

            total.textContent = tasks.length;
            done.textContent = d;
            not.textContent = n;
            pending.textContent = p;
            percent.textContent = tasks.length
                ? Math.round(d / tasks.length * 100) + "%"
                : "0%";
            streak.textContent = streak;
        }

        render();
    </script>

</body>

</html>
